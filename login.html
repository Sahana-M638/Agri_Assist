<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - AgriAssist AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

:root{
--primary:#2e7d32;
--light:#f4fff4;
}

body{
background:var(--light);
min-height:100vh;
}

/* Navbar */

header{
background:var(--primary);
padding:15px 8%;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
color:white;
font-size:28px;
font-weight:bold;
}

.nav-links{
display:flex;
list-style:none;
gap:25px;
}

.nav-links a{
text-decoration:none;
color:white;
font-weight:600;
}

.nav-links a:hover{
color:#ffeb3b;
}

/* Login Section */

.container{
display:flex;
justify-content:center;
align-items:center;
padding:60px 20px;
}

.login-card{
background:white;
width:420px;
padding:35px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.1);
}

.login-card h1{
text-align:center;
color:#1b5e20;
margin-bottom:10px;
}

.login-card p{
text-align:center;
color:#666;
margin-bottom:25px;
}

.form-group{
margin-bottom:18px;
}

label{
display:block;
margin-bottom:8px;
font-weight:600;
}

input{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
}

button{
width:100%;
padding:12px;
background:var(--primary);
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#1b5e20;
}

.links{
text-align:center;
margin-top:15px;
}

.links a{
text-decoration:none;
color:var(--primary);
font-weight:600;
display:block;
margin-top:8px;
}

/* Footer */

footer{
background:var(--primary);
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}

@media(max-width:768px){

nav{
flex-direction:column;
gap:15px;
}

.nav-links{
flex-wrap:wrap;
justify-content:center;
}

.login-card{
width:100%;
}

}

</style>
</head>

<body>

<header>

<nav>

<div class="logo">
🌱 AgriAssist AI
</div>

<ul class="nav-links">
<li><a href="index.html">Home</a></li>
<li><a href="about.html">About Us</a></li>
<li><a href="contact.html">Contact</a></li>
<li><a href="register.html">Register</a></li>
</ul>

</nav>

</header>

<div class="container">

<div class="login-card">

<h1>Login</h1>

<p>Access your farming dashboard</p>

<form id="loginForm">

<div class="form-group">
<label>Email / Username</label>
<input type="text" id="username" required>
</div>

<div class="form-group">
<label>Password</label>
<input type="password" id="password" required>
</div>

<button type="submit">
Login
</button>

<div class="links">
<a href="forgot.html">Forgot Password?</a>
<a href="register.html">Create New Account</a>
</div>

</form>

</div>

</div>

<footer>

<h3>AgriAssist AI</h3>
<p>Smart Farming • Better Future</p>

</footer>

<script>

document.getElementById("loginForm")
.addEventListener("submit",function(e){

e.preventDefault();

let username =
document.getElementById("username").value;

let password =
document.getElementById("password").value;

if(username==="" || password===""){
alert("❌ Please fill all fields");
return;
}

alert("✅ Login Successful");

window.location.href="dashboard.html";

});

</script>

</body>
</html>
